name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker-compose-validate:
    name: Docker Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Docker Compose
        run: |
          DOCKER_COMPOSE_VERSION="v2.24.5"
          sudo curl -fsSL \
            "https://github.com/docker/compose/releases/download/${DOCKER_COMPOSE_VERSION}/docker-compose-linux-x86_64" \
            -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose version

      - name: Validate all docker-compose files
        run: |
          FAILED=0
          for dir in server dmz; do
            if [ -f "$dir/docker-compose.yml" ]; then
              echo "▶ Validando $dir/docker-compose.yml"
              if (cd "$dir" && docker-compose config --quiet 2>&1); then
                echo "✔ $dir/docker-compose.yml OK"
              else
                echo "❌ $dir/docker-compose.yml inválido"
                FAILED=$((FAILED + 1))
              fi
            else
              echo "⚠ No se encontró $dir/docker-compose.yml"
            fi
          done
          exit $FAILED

      - name: Scan for hardcoded secrets
        run: |
          if grep -rn --include="docker-compose*.yml" \
            -E '(password|passwd|secret|token)\s*:\s*[^$\{][^\s]{4,}' .; then
            echo "❌ Credenciales hardcodeadas detectadas. Usa variables de entorno."
            exit 1
          fi
          echo "✔ Sin credenciales expuestas"

  bash-lint:
    name: Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Lint all .sh files
        run: |
          SCRIPTS=$(find . -name "*.sh" -not -path "./.git/*")
          if [ -z "$SCRIPTS" ]; then
            echo "No se encontraron scripts .sh"
            exit 0
          fi
          # severity=error: solo falla en errores reales, los warnings son informativos
          echo "$SCRIPTS" | xargs shellcheck --severity=error --shell=bash
          echo "✔ ShellCheck completado (warnings son informativos, no bloquean)"

  yaml-lint:
    name: YAML syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint --break-system-packages

      - name: Create yamllint config
        run: |
          cat > .yamllint.yml << 'EOF'
          extends: default
          rules:
            line-length:
              max: 120
            comments:
              min-spaces-from-content: 1
            truthy:
              allowed-values: ['true', 'false', 'on', 'off']
          EOF

      - name: Lint all YAML files
        run: |
          find . -name "*.yml" -o -name "*.yaml" | \
            grep -v ".git" | \
            grep -v "node_modules" | \
            xargs yamllint -c .yamllint.yml
