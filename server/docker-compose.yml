services:

  traefik:
    image: traefik:latest
    container_name: millornet-traefik
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./traefik:/etc/traefik
    networks:
      - millornet-network

  portainer:
    image: portainer/portainer-ce:latest
    container_name: millornet-portainer
    restart: always
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./portainer:/data
    networks:
      - millornet-network

  duplicati:
    image: linuxserver/duplicati:latest
    container_name: millornet-duplicati
    restart: always
    ports:
      - "8200:8200"
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Madrid
      - SETTINGS_ENCRYPTION_KEY=Millornet2026!
      - DUPLICATI__WEBSERVICE_PASSWORD=alumnes
    volumes:
      - ./duplicati:/config
      - ./backups:/backups
      - ./millornet:/source
    networks:
      - millornet-network

  prometheus:
    image: prom/prometheus:latest
    container_name: millornet-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - millornet-network

  grafana:
    image: grafana/grafana:latest
    container_name: millornet-grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=alumnes
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - millornet-network

  node-exporter:
    image: prom/node-exporter:latest
    container_name: millornet-node-exporter
    restart: always
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - millornet-network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: millornet-cadvisor
    restart: always
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - millornet-network

networks:
  millornet-network:
    external: true

volumes:
  prometheus_data:
  grafana_data:
